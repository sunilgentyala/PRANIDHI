<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PRANIDHI — Five-Layer Architecture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      background: #f9f8f5;
      color: #1a1a18;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e3dc;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header h1 span { color: #888; font-weight: 400; margin-left: 8px; font-size: 14px; }

    header a {
      font-size: 13px;
      color: #185fa5;
      text-decoration: none;
    }
    header a:hover { text-decoration: underline; }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 10px;
      letter-spacing: 0.02em;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }

    .diagram-pane {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: auto;
    }

    .diagram-pane svg {
      max-width: 720px;
      width: 100%;
    }

    /* Make clickable layers show pointer and highlight on hover */
    .diagram-pane svg g[onclick] {
      cursor: pointer;
    }
    .diagram-pane svg g[onclick]:hover rect:first-child,
    .diagram-pane svg g[onclick]:hover rect:first-of-type {
      filter: brightness(0.93);
    }

    /* Info panel */
    .info-panel {
      width: 340px;
      min-width: 280px;
      background: #fff;
      border-left: 1px solid #e5e3dc;
      padding: 28px 24px;
      overflow-y: auto;
      transition: transform 0.2s ease;
    }

    .info-panel.empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #aaa;
      gap: 12px;
    }

    .info-panel.empty svg { opacity: 0.3; }

    .layer-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .info-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .info-panel .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }

    .info-panel p {
      font-size: 13px;
      line-height: 1.65;
      color: #3a3a38;
      margin-bottom: 14px;
    }

    .info-panel h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin: 18px 0 8px;
    }

    .info-panel ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .info-panel ul li {
      font-size: 13px;
      color: #3a3a38;
      padding: 6px 10px;
      border-radius: 5px;
      border: 1px solid #e8e6df;
      background: #faf9f6;
      line-height: 1.4;
    }

    .info-panel ul li strong { display: block; font-size: 12px; margin-bottom: 2px; }

    @media (max-width: 680px) {
      .layout { flex-direction: column; }
      .info-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid #e5e3dc;
      }
    }
  </style>
</head>
<body>

</header>

<script>
const LAYERS = {
  idl: {
    tag: 'Layer 1', tagColor: '#185fa5', tagBg: '#e6f1fb',
    title: 'IDL — Ingestion & Decomposition Layer',
    subtitle: 'Structural decomposition and encoding normalisation',
    body: 'The IDL is the entry point for all prompt traffic. It receives raw user input and transforms it into semantically discrete ContentBlocks for downstream processing.',
    bullets: [
      { label: 'Encoding normalisation', detail: 'Strips zero-width characters, decodes Base64 fragments and URL-encoded sequences, normalises Unicode homoglyphs (Cyrillic/Latin lookalikes).' },
      { label: 'PII detection', detail: 'Regex-based extraction of emails, SSNs, credit cards, account numbers, phone numbers, and IP addresses.' },
      { label: 'Credential detection', detail: 'High-entropy pattern matching for API keys, tokens, secrets, and bearer credentials.' },
      { label: 'Code detection', detail: 'Heuristic scanning for programming constructs (def, class, SELECT, etc.).' },
    ]
  },
  crse: {
    tag: 'Layer 2', tagColor: '#534ab7', tagBg: '#eeedfe',
    title: 'CRSE — Classification & Risk Scoring Engine',
    subtitle: 'Three-dimensional composite risk scoring',
    body: 'The CRSE assigns a composite risk score to each ContentBlock across three independent dimensions, producing a GREEN / AMBER / RED disposition.',
    bullets: [
      { label: 'Data sensitivity', detail: 'How inherently sensitive is the content type? Credentials score highest, followed by PII, code, URLs, and free text.' },
      { label: 'Exposure risk', detail: 'Adjusted by target platform (external LLM vs. internal sandbox) and user role (trained security analysts receive lower penalties).' },
      { label: 'Inferential leakage', detail: 'Can the prompt leak sensitive information indirectly, even if no explicit PII is present? Scored separately to catch aggregation attacks.' },
    ]
  },
  ne: {
    tag: 'Layer 3 — Core Innovation', tagColor: '#993c1d', tagBg: '#faeae7',
    title: 'NE — Nudging Engine',
    subtitle: 'Real-time prompt coaching with four intervention strategies',
    body: 'Instead of blocking a risky prompt outright, the Nudging Engine offers the user a safer reformulation in real time — teaching them to work with AI rather than around guardrails.',
    bullets: [
      { label: 'Substitutive Reformulation', detail: 'Replaces real data with synthetic equivalents. "Analyse Client-A\'s $2.3M contract" → "Analyse a mid-size client contract in the $2–3M range."' },
      { label: 'Decomposition', detail: 'Splits one risky multi-entity prompt into several safe sub-queries, each containing only non-sensitive fragments.' },
      { label: 'Abstraction Elevation', detail: 'Lifts specific instances to general patterns. "Why did Acme Corp\'s Q3 revenue drop 14.7%?" → "What frameworks analyse 10–20% revenue declines?"' },
      { label: 'Tool Redirection', detail: 'Routes the request to a safer execution path: an internal sandbox model, an approved knowledge base, or a privacy-preserving API.' },
    ]
  },
  peol: {
    tag: 'Layer 4', tagColor: '#0f6e56', tagBg: '#e1f5ee',
    title: 'PEOL — Policy Enforcement & Orchestration Layer',
    subtitle: 'Federated policy hierarchy across three tiers',
    body: 'The PEOL makes the final allow / coach / block decision by evaluating the risk annotations against a federated policy hierarchy. Policies compose — stricter tiers always win.',
    bullets: [
      { label: 'Enterprise floor', detail: 'Organisation-wide baseline rules set by the security team. No individual or business unit can relax these.' },
      { label: 'Business unit rules', detail: 'Department-specific policies layered on top of the enterprise floor. A legal team might have stricter PII rules; a security team might have relaxed code-snippet rules.' },
      { label: 'Role exemptions', detail: 'Fine-grained per-role overrides, e.g. a CISO can send prompts that a junior analyst cannot. Managed via YAML policy files.' },
    ]
  },
  taall: {
    tag: 'Layer 5', tagColor: '#3b6d11', tagBg: '#eaf3de',
    title: 'TAALL — Telemetry, Analytics & Adaptive Learning Layer',
    subtitle: 'Behavioural analytics and continuous threshold adaptation',
    body: 'The TAALL collects structured telemetry on every scan and uses it to continuously improve PRANIDHI\'s detection thresholds and coaching effectiveness.',
    bullets: [
      { label: 'Behavioural analytics', detail: 'Tracks risk distributions per user, department, and platform over time to surface anomalies and high-risk actors.' },
      { label: 'Adaptive thresholds', detail: 'Risk scoring thresholds drift toward historical norms — preventing alert fatigue while remaining sensitive to genuine outliers.' },
      { label: 'Coaching effectiveness', detail: 'Measures which coaching strategies users actually accept vs. override, feeding back into strategy selection weights.' },
      { label: 'Audit log', detail: 'Append-only structured event log for compliance reporting, incident response, and regulatory audits.' },
    ]
  }
};

function sendPrompt(key) {
  const layer = LAYERS[key];
  if (!layer) return;
  const panel = document.getElementById('panel');
  panel.classList.remove('empty');
  panel.innerHTML = `
    <span class="layer-tag" style="color:${layer.tagColor};background:${layer.tagBg}">${layer.tag}</span>
    <h2>${layer.title}</h2>
    <p class="subtitle">${layer.subtitle}</p>
    <p>${layer.body}</p>
    <h3>Key components</h3>
    <ul>
      ${layer.bullets.map(b => `<li><strong>${b.label}</strong>${b.detail}</li>`).join('')}
    </ul>
  `;
}
</script>
</body>
</html>
